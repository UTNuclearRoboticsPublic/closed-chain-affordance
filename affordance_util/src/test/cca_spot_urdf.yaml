# Provide the reference frame, kinematic chain, end effector and tool info
# The following info is for the Spot robot arm
ref_frame:
  - name: arm0_base_link

kinematic_chain:
  - base_joint_name: arm0_shoulder_yaw
    end_joint_name: arm0_wrist_roll

end_effector:
  - frame_name: arm0_fingers
    gripper_joint_name: arm0_fingers # Unused but provide one valid gripper joint name

tool: # This does not have to be in the URDF, and is usually located at the center of the palm.
  - name: arm0_tool0 
    offset_from_ee_frame: [0.07805, 0.0008, -0.01772] # Tool location in the EE frame
